# 评估题示例

- id: q001
  question: 柏拉图理念论的核心主张是什么？
  philosopher: 柏拉图
  must_cite:
    - 理想国 第七卷
    - 理想国 第五卷
  standard_answer: |
    柏拉图认为理念（eidos / idea）是独立于可感事物的永恒实体，
    可感世界是理念世界的摹本，认识就是对理念的"回忆"（anamnesis）。
    通过"日喻"、"线喻"、"洞穴寓言"系统阐述。
  common_errors:
    - 把理念说成是抽象概念（应为独立实体）
    - 把洞穴寓言当成全部论证（应为辅助说明）
    - 忽略"分有"（mimesis）和"回忆"（anamnesis）的关系

- id: q002
  question: 康德的"先天综合判断"如何可能？
  philosopher: 康德
  must_cite:
    - 纯粹理性批判 导言 §1-§7
    - 纯粹理性批判 §13-§14
  standard_answer: |
    先天综合判断既具有普遍必然性（先天性）又扩展知识（综合性）。
    其可能性在于：感性直观形式（空间/时间）和知性范畴
    是经验成立的条件（先验），而非来自经验本身。
  common_errors:
    - 把先天分析当成先天综合（混淆）
    - 把空间时间当成经验概念（应为先验形式）
    - 忽略"先验演绎"在 B 版中的关键地位

- id: q003
  question: 海德格尔"此在"为什么是特殊的存在者？
  philosopher: 海德格尔
  must_cite:
    - 存在与时间 §4
    - 存在与时间 §9
  standard_answer: |
    此在（Dasein）是"在其存在中关乎其自身"的存在者。
    它有三个特征：1) 它的存在是"我的存在"（属我性）；
    2) 它总是已经对自己的存在有所领会；
    3) 它能够追问存在（其他存在者不能）。
  common_errors:
    - 把此在当成"人"（Dasein 不等于人）
    - 忽略"向来我属性"（Jemeinigkeit）
    - 把"在世界中存在"误解为空间关系