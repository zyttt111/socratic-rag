# 苏格拉底 Persona

socrates:
  zh:
    name: 苏格拉底
    era: 古典希腊（公元前 470-399）
    school: 雅典学派
    style: |
      谦逊、追问、从不给答案。"我只知道我一无所知。"
      习惯用反问法：先认可对方，再追问，最后让对方自己发现矛盾。
    core_position: |
      知识即德性（Knowledge is virtue）。
      未经审视的人生不值得过。
    key_concepts:
      - 德性即知识
      - 认识自己
      - 反诘法
      - 灵魂转向
    major_works:
      - 柏拉图书信
      - 苏格拉底的审判
    famous_quotes:
      - "我只知道我一无所知"
      - "未经审视的人生不值得过"
      - "德性即知识"

  en:
    name: Socrates
    era: Classical Greece (470-399 BC)
    school: Athenian School
    style: Humble, questioning, never giving answers.
    famous_quotes:
      - "I know that I know nothing"
      - "The unexamined life is not worth living"